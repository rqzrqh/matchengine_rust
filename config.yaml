# Shared by matching engine and web-test (DB, Kafka, market, etc.)

market:
  name: eth_btc
  stock_prec: 1
  money_prec: 2
  fee_prec: 3
  min_amount: "0.1"

brokers: "127.0.0.1:9092"

db:
  addr: "127.0.0.1:3306"
  user: root
  passwd: "123456"

# Bounded queue for all tasks sent into the single matcher thread, including offer-consumer input.
# When full, producers block and apply backpressure instead of growing memory unbounded.
main_task_queue_capacity: 500000

# --- Snapshot dump ---
# Forks a child process on an interval; writes one row to `snap` and order rows to `snap_order_<timestamp>`.
snap_dump:
  # Interval between dumps, in seconds.
  dump_interval_secs: 600

# --- Snapshot cleanup ---
# Drops old `snap` rows and their `snap_order_*` tables. A snapshot is eligible for removal if EITHER:
# its `time` is older than max_age_secs OR the table holds more than max_snapshots rows (oldest removed first).
# The snapshot chosen for recovery is never deleted. Runs every cleanup_interval_secs; if both limits are 0, each pass is a no-op.
snap_cleanup:
  # Max age in seconds for `snap.time`; 0 disables age-based pruning.
  max_age_secs: 3600
  # Keep at most this many newest snapshots (by `time`); 0 disables count-based pruning.
  max_snapshots: 10
  # How often the cleanup job runs, in seconds.
  cleanup_interval_secs: 60

# --- Downstream Kafka publish (quote vs settle producers are configured separately) ---
output_publish:
  # Max interval for coalesced quote/settle progress updates; idle workers flush immediately.
  progress_flush_interval_ms: 1000
  quote:
    # `quote_deals.<market>`
    kafka:
      batch_num_messages: 1024
      linger_ms: 10
      max_in_flight_requests_per_connection: 1
      queue_buffering_max_messages: 100000
      queue_buffering_max_kbytes: 1048576
      compression_type: none
      delivery_timeout_ms: 5000
      statistics_interval_ms: 0
    # Bounded channel from matcher main thread to quote publish thread; full queue backpressures matching.
    channel_capacity: 300000
    drain_batch_size: 1024
    max_outstanding: 65536
  settle:
    kafka:
      batch_num_messages: 4096
      linger_ms: 5
      max_in_flight_requests_per_connection: 5
      queue_buffering_max_messages: 100000
      queue_buffering_max_kbytes: 1048576
      compression_type: none
      delivery_timeout_ms: 5000
      statistics_interval_ms: 0
    # Bounded channel per settle publish worker; full queue backpressures matching for groups mapped to that worker.
    channel_capacity: 1000000
    drain_batch_size: 4096
    # Per settle partition/group in-flight delivery window.
    max_outstanding: 16384
    # Per settle publish worker in-flight delivery window; caps aggregate group fan-out per worker.
    worker_max_outstanding: 65536
    # Max records one settle group may enqueue per scheduling turn before the worker tries other ready groups.
    per_group_send_burst: 256
    # Number of application settle publish workers. The settle topic partition count
    # and USER_SETTLE_GROUP_SIZE must be integer multiples of this value.
    thread_count: 8
